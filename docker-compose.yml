services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invoice_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/invoice_db?schema=public
    # Mount local codebase for hot-reloading
    # Anonymous volume for node_modules to prevent OS conflicts
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
